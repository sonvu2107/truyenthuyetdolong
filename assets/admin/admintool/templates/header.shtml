/* 过滤页面输出条目个数*/
function filter(page,num){
    window.location.href= page+'?ac=filter&num='+num;
}

/* 只能输入数字的DIV */
function checknum(str){
    if( isNaN($("#"+str).val()) || $("#"+str).val() < 0 ){
        alert("<{$lang.alert.num}>");
        $("#"+str).val("");
        return false;
    }

}


/* 过滤数组中重复元素 */
function uniqueArr(arr)
{
    arr = arr || [];
    var a = {};
    for (var i=0; i<arr.length; i++)
    {
        var v = arr[i];
        if (typeof(a[v]) == 'undefined')
    {
            a[v] = 1;
        }
    }
    arr.length = 0;
    for (var i in a )
    {
        arr[arr.length] = i;
    }

    return arr;
}

/* 角色的基本信息框 */
function baseInfo(name)
{
    //alert(name);
    if(name != ""){
        $.ajax({
                url : "./rolemap.php?ac=rolename&name="+encodeURI(name),
                type : "GET",
                dataType : "json",
                success : function (json)
                {
                    if(!json.error){
                        $("#bubbleInfo").draggable();

                        $("#info_rname").html(json.data.role_name);
                        $("#info_rid").html(json.data.role_id);
                        $("#info_level").html(json.data.level+'级');
                        $("#info_cty").html(json.data.country);
                        $("#info_pro").html(json.data.professional);
                        $("#info_pname").html(json.data.plat_user_name);
                        $("#info_server").html(json.data.server);
                        $("#info_ctime").html(json.data.create_time);
                        $("#send").attr("disabled","");

                        $('#bubbleInfo').css("width","200px");
                        $('#bubbleInfo').css("height","200px");
                        $('#bubbleInfo').css("top","-100px" );
                        $('#bubbleInfo').css("right","300px");

                        $('#bubbleInfo').each(function () {
                            var time = 150;
                            var hideDelay = 200;
                            var hideDelayTimer = null;
                            var beingShown = false;
                            var shown = false;
                            var trigger = $('.trigger', this);
                            var info = $('.popup', this).css('opacity', 0);
                            if (hideDelayTimer) clearTimeout(hideDelayTimer);
                            if (beingShown || shown) {
                                return;
                            } else {
                                beingShown = true;
                                info.css({
                                    top: -90,
                                    left: -33,
                                    display: 'block'
                                }).animate({
                                    top: '+=250px',
                                    opacity: 1
                                }, time, 'swing', function() {
                                    beingShown = false;
                                    shown = true;
                                });
                            }
                            $("#clos").click(function () {
                                $('#bubbleInfo').animate({
                                    top: '-=1000px'
                                });
                                return false;
                            });
                        });

                    }else{
                        $(".popup").css("display","none");
                        $("#send").attr("disabled","disabled");
                    }
                }});
    }else{
        $(".popup").css("display","none");
        $("#send").attr("disabled","");
    }
}
</script>
