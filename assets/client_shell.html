<!doctype html>
<html>
<head>
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Truyền Thuyết Đồ Long</title>
<style type="text/css">
html, body {
	margin: 0;
	padding: 0;
	width: 100%;
	height: 100%;
	overflow: hidden;
	background: #000;
}

#launcherFrame {
	position: absolute;
	left: 0;
	top: 0;
	width: 962px;
	height: 647px;
	background: #000 url(client_frame.png) no-repeat 0 0;
}

#gamePortal {
	position: absolute;
	border: 0;
	margin: 0;
	padding: 0;
	background: #120805;
	transform-origin: 0 0;
	-ms-transform-origin: 0 0;
}

body.launcher-mode #gamePortal {
	left: 402px;
	top: 202px;
	width: 667px;
	height: 338px;
	transform: scale(0.712);
	-ms-transform: scale(0.712);
}

body.game-mode #launcherFrame {
	display: none;
}

body.game-mode #gamePortal {
	left: 0;
	top: 0;
	width: 1023px;
	height: 688px;
	transform: scale(0.94);
	-ms-transform: scale(0.94);
}
</style>
<script type="text/javascript">
(function () {
	function isGamePage(frame) {
		try {
			var path = String(frame.contentWindow.location.pathname || "").toLowerCase();
			return path.indexOf("/game/") !== -1 || /\/(gph|game1)\.(php|html)$/.test(path);
		} catch (ignore) {
			return false;
		}
	}

	function syncMode() {
		var frame = document.getElementById("gamePortal");
		document.body.className = isGamePage(frame) ? "game-mode" : "launcher-mode";
	}

	function init() {
		var frame = document.getElementById("gamePortal");
		if (frame.attachEvent) {
			frame.attachEvent("onload", syncMode);
		} else {
			frame.onload = syncMode;
		}
		syncMode();
		window.setInterval(syncMode, 500);
	}

	if (window.attachEvent) {
		window.attachEvent("onload", init);
	} else {
		window.onload = init;
	}
}());
</script>
</head>
<body class="launcher-mode" scroll="no">
	<div id="launcherFrame"></div>
	<iframe id="gamePortal" name="gamePortal" src="login_p.php?v=20260710ui1" frameborder="0" scrolling="no"></iframe>
</body>
</html>
