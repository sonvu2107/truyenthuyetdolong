<!doctype html>
<html>
<head>
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Truyền Thuyết Đồ Long</title>
<style type="text/css">
html, body {
	margin: 0;
	padding: 0;
	width: 100%;
	height: 100%;
	overflow: hidden;
	background: #120805 url(images/box_bg.jpg) no-repeat center center;
	background-size: cover;
}

#launcherStage {
	position: absolute;
	left: 50%;
	top: 50%;
	width: 962px;
	height: 647px;
	margin-left: -481px;
	margin-top: -323px;
}

#launcherFrame {
	position: absolute;
	left: 0;
	top: 0;
	width: 962px;
	height: 647px;
	background: transparent url(client_frame.png) no-repeat 0 0;
}

#gamePortal {
	position: absolute;
	border: 0;
	margin: 0;
	padding: 0;
	background: #120805;
	transform-origin: 0 0;
	-ms-transform-origin: 0 0;
}

body.launcher-mode #gamePortal {
	left: 402px;
	top: 202px;
	width: 667px;
	height: 338px;
	transform: scale(0.712);
	-ms-transform: scale(0.712);
}

body.game-mode #launcherFrame {
	display: none;
}

body.game-mode {
	background: #000;
}

body.game-mode #launcherStage {
	left: 0;
	top: 0;
	width: 100%;
	height: 100%;
	margin: 0;
}

body.game-mode #gamePortal {
	left: 0;
	top: 0;
}

#fullscreenButton {
	display: none;
	position: fixed;
	right: 10px;
	top: 10px;
	z-index: 20;
	padding: 7px 10px;
	border: 1px solid #c99845;
	border-radius: 3px;
	color: #ffe7a8;
	background: rgba(30, 10, 4, 0.82);
	font: bold 12px Arial, Helvetica, sans-serif;
	cursor: pointer;
	opacity: 0.72;
}

#fullscreenButton:hover,
#fullscreenButton:focus {
	opacity: 1;
}

body.game-mode #fullscreenButton {
	display: block;
}
</style>
<script type="text/javascript">
(function () {
	var GAME_BASE_WIDTH = 1000;
	var GAME_BASE_HEIGHT = 600;
	var gameStarted = false;
	var lastLayoutTrace = "";

	function isGamePage(frame) {
		try {
			var path = String(frame.contentWindow.location.pathname || "").toLowerCase();
			return path.indexOf("/game/") !== -1 || /\/(gph|game1)\.(php|html)$/.test(path);
		} catch (ignore) {
			return false;
		}
	}

	function traceLayout(data) {
		if (data === lastLayoutTrace) {
			return;
		}
		lastLayoutTrace = data;
		try {
			(new Image()).src = "/client_trace.php?step=shell_game_layout&data=" +
				encodeURIComponent(data) + "&t=" + (new Date()).getTime();
		} catch (ignore) {}
	}

	function layoutGame() {
		var frame = document.getElementById("gamePortal");
		var width = document.documentElement.clientWidth || document.body.clientWidth || 1000;
		var height = document.documentElement.clientHeight || document.body.clientHeight || 600;
		var scale = Math.min(width / GAME_BASE_WIDTH, height / GAME_BASE_HEIGHT);
		if (!isFinite(scale) || scale <= 0) {
			scale = 1;
		}
		var logicalWidth = Math.ceil(width / scale);
		var logicalHeight = Math.ceil(height / scale);
		document.body.className = "game-mode";
		frame.style.left = "0";
		frame.style.top = "0";
		frame.style.width = logicalWidth + "px";
		frame.style.height = logicalHeight + "px";
		frame.style.transform = "scale(" + scale + ")";
		frame.style.msTransform = "scale(" + scale + ")";
		traceLayout(
			"viewport=" + width + "x" + height +
			"|logical=" + logicalWidth + "x" + logicalHeight +
			"|scale=" + scale.toFixed(3)
		);
	}

	function layoutLauncher() {
		var frame = document.getElementById("gamePortal");
		document.body.className = "launcher-mode";
			frame.style.left = "402px";
			frame.style.top = "202px";
			frame.style.width = "667px";
			frame.style.height = "338px";
			frame.style.transform = "scale(0.712)";
			frame.style.msTransform = "scale(0.712)";
	}

	function prepareGameMode() {
		gameStarted = true;
		layoutGame();
	}

	function syncMode() {
		var frame = document.getElementById("gamePortal");
		if (gameStarted || isGamePage(frame)) {
			prepareGameMode();
		} else {
			layoutLauncher();
		}
	}

	function isGameLauncherAction(target, frame) {
		var node = target;
		while (node && node !== frame.contentDocument) {
			var href = node.href ? String(node.href).toLowerCase() : "";
			var id = String(node.id || "").toLowerCase();
			var className = String(node.className || "").toLowerCase();
			if (href.indexOf("/game/login.php") !== -1 ||
				id === "last_server" || id === "last_server3" ||
				/(^|\s)btn(\s|$)/.test(className)) {
				return true;
			}
			node = node.parentNode;
		}
		return false;
	}

	function hookLauncherActions(frame) {
		try {
			var doc = frame.contentDocument || frame.contentWindow.document;
			var path = String(frame.contentWindow.location.pathname || "").toLowerCase();
			if (!doc || path.indexOf("/a.php") === -1 || doc.__gameLayoutHooked) {
				return;
			}
			doc.__gameLayoutHooked = true;
			var pointerHandler = function (event) {
				event = event || frame.contentWindow.event;
				if (isGameLauncherAction(event.srcElement || event.target, frame)) {
					prepareGameMode();
				}
			};
			var keyHandler = function (event) {
				event = event || frame.contentWindow.event;
				if ((event.keyCode || event.which) === 13) {
					prepareGameMode();
				}
			};
			if (doc.attachEvent) {
				doc.attachEvent("onclick", pointerHandler);
				doc.attachEvent("onkeydown", keyHandler);
			} else {
				doc.addEventListener("click", pointerHandler, true);
				doc.addEventListener("keydown", keyHandler, true);
			}
		} catch (ignore) {}
	}

	function toggleFullscreen() {
		var root = document.documentElement;
		var request = root.requestFullscreen || root.webkitRequestFullscreen ||
			root.mozRequestFullScreen || root.msRequestFullscreen;
		if (request) {
			request.call(root);
		}
	}

	function init() {
		var frame = document.getElementById("gamePortal");
		if (frame.attachEvent) {
			frame.attachEvent("onload", function () {
				syncMode();
				hookLauncherActions(frame);
			});
		} else {
			frame.onload = function () {
				syncMode();
				hookLauncherActions(frame);
			};
		}
		syncMode();
		hookLauncherActions(frame);
		document.getElementById("fullscreenButton").onclick = toggleFullscreen;
		if (window.attachEvent) {
			window.attachEvent("onresize", syncMode);
		} else {
			window.onresize = syncMode;
		}
	}

	if (window.attachEvent) {
		window.attachEvent("onload", init);
	} else {
		window.onload = init;
	}
	window.prepareGameMode = prepareGameMode;
}());
</script>
</head>
<body class="launcher-mode" scroll="no">
	<div id="launcherStage">
		<div id="launcherFrame"></div>
		<iframe id="gamePortal" name="gamePortal" src="login_p.php?v=20260711questvi1" frameborder="0" scrolling="no" allowfullscreen="allowfullscreen"></iframe>
	</div>
	<button id="fullscreenButton" type="button" title="Phóng game ra toàn màn hình">&#x26F6; Toàn màn hình</button>
</body>
</html>
