<!doctype html>
<html>
<head>
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Truyền Thuyết Đồ Long</title>
<style type="text/css">
html, body {
	margin: 0;
	padding: 0;
	width: 100%;
	height: 100%;
	overflow: hidden;
	background: #120805 url(images/box_bg.jpg) no-repeat center center;
	background-size: cover;
}

#launcherStage {
	position: absolute;
	left: 50%;
	top: 50%;
	width: 962px;
	height: 647px;
	margin-left: -481px;
	margin-top: -323px;
}

#launcherFrame {
	position: absolute;
	left: 0;
	top: 0;
	width: 962px;
	height: 647px;
	background: transparent url(client_frame.png) no-repeat 0 0;
}

#gamePortal {
	position: absolute;
	border: 0;
	margin: 0;
	padding: 0;
	background: #120805;
	transform-origin: 0 0;
	-ms-transform-origin: 0 0;
}

body.launcher-mode #gamePortal {
	left: 402px;
	top: 202px;
	width: 667px;
	height: 338px;
	transform: scale(0.712);
	-ms-transform: scale(0.712);
}

body.game-mode #launcherFrame {
	display: none;
}

body.game-mode #launcherStage {
	left: 0;
	top: 0;
	width: 100%;
	height: 100%;
	margin: 0;
}

body.game-mode #gamePortal {
	left: 0;
	top: 0;
}
</style>
<script type="text/javascript">
(function () {
	function isGamePage(frame) {
		try {
			var path = String(frame.contentWindow.location.pathname || "").toLowerCase();
			return path.indexOf("/game/") !== -1 || /\/(gph|game1)\.(php|html)$/.test(path);
		} catch (ignore) {
			return false;
		}
	}

	function syncMode() {
		var frame = document.getElementById("gamePortal");
		var gameMode = isGamePage(frame);
		document.body.className = gameMode ? "game-mode" : "launcher-mode";
		if (gameMode) {
			var width = document.documentElement.clientWidth || document.body.clientWidth || 962;
			var height = document.documentElement.clientHeight || document.body.clientHeight || 647;
			var scale = width < 1000 ? width / 1000 : 1;
			frame.style.width = Math.ceil(width / scale) + "px";
			frame.style.height = Math.ceil(height / scale) + "px";
			frame.style.transform = "scale(" + scale + ")";
			frame.style.msTransform = "scale(" + scale + ")";
		} else {
			frame.style.width = "667px";
			frame.style.height = "338px";
			frame.style.transform = "scale(0.712)";
			frame.style.msTransform = "scale(0.712)";
		}
	}

	function init() {
		var frame = document.getElementById("gamePortal");
		if (frame.attachEvent) {
			frame.attachEvent("onload", syncMode);
		} else {
			frame.onload = syncMode;
		}
		syncMode();
		window.setInterval(syncMode, 500);
		if (window.attachEvent) {
			window.attachEvent("onresize", syncMode);
		} else {
			window.onresize = syncMode;
		}
	}

	if (window.attachEvent) {
		window.attachEvent("onload", init);
	} else {
		window.onload = init;
	}
}());
</script>
</head>
<body class="launcher-mode" scroll="no">
	<div id="launcherStage">
		<div id="launcherFrame"></div>
		<iframe id="gamePortal" name="gamePortal" src="login_p.php?v=20260710ui2" frameborder="0" scrolling="no"></iframe>
	</div>
</body>
</html>
